<!-- ================= Section Hero Reset Password ================= -->
<section class="reset-password-hero py-5">
  <div class="container">
    <h1 class="reset-password-hero-title">Réinitialisation de votre mot de passe</h1>
    <p class="reset-password-hero-description">Saisissez votre nouveau mot de passe ci-dessous.</p>
  </div>
</section>

<!-- ================= Section Formulaire Reset Password ================= -->
<section class="reset-password-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

        <div class="reset-password-card">

          <h1 class="reset-password-title">Réinitialisation</h1>
          <p class="reset-password-description">Entrez votre nouveau mot de passe.</p>

          <!-- Formulaire -->
          <form class="reset-password-form">
            <!-- Nouveau mot de passe -->
            <div class="mb-4">
              <label for="NewPasswordInput" class="form-label">Nouveau mot de passe <span class="required">*</span></label>
              <input 
                type="password" 
                class="form-control" 
                id="NewPasswordInput" 
                placeholder="Votre nouveau mot de passe" 
                required
              >
              <button type="button" id="togglePassword" class="btn btn-sm btn-outline-secondary mt-1" aria-label="Afficher/masquer le mot de passe">
                <i class="bi bi-eye"></i>
              </button>
              <small class="validation-message"></small>
            </div>

            <!-- Confirmation mot de passe -->
            <div class="mb-4">
              <label for="ConfirmPasswordInput" class="form-label">
                Confirmer le mot de passe <span class="required">*</span>
              </label>
              <input 
                type="password"
                class="form-control"
                id="ConfirmPasswordInput"
                placeholder="Confirmez votre mot de passe"
                required
              >

              <div class="invalid-feedback">
                Les mots de passe ne correspondent pas
              </div>

              <div class="valid-feedback">
                Les mots de passe correspondent
              </div>
            </div>
            <!-- Bouton de confirmation de mot de passe forte -->
            <div class="password-strength-container">
              <div class="password-strength-bar"></div>
            </div>

            <div class="password-strength-text"></div>

            <!-- Bouton de soumission -->
            <div class="d-grid">
              <button type="submit" class="btn btn-reset-password">
                <i class="bi bi-person-fill-lock me-2"></i>
                Réinitialiser le mot de passe
              </button>
            </div>
          </form>

          <!-- Messages -->
          <p class="reset-password-error-message text-danger mt-2" style="display:none;"></p>
          <p class="reset-password-success-message text-success mt-2" style="display:none;"></p>

          <div class="reset-password-signup mt-3">
            <a href="/login">Retourner à la connexion</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

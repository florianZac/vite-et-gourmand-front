<!-- ================= Section Hero Reset Password ================= -->
<section class="reset-password-hero py-5">
  <div class="container">
    <!-- Titre -->
    <h1 class="reset-password-hero-title">Réinitialisation de votre mot de passe</h1>
    <!-- Description -->
    <p class="reset-password-hero-description">Saisissez votre email, nous vous enverrons un mail de réinitialisation.</p>
  </div>
</section>

<!-- ================= Section Formulaire Reset Password ================= -->
<section class="reset-password-section">
  <div class="container">
    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

        <!-- Carte de reset password -->
        <div class="reset-password-card">

          <!-- Titre -->
          <h1 class="reset-password-title">Mot de passe oublié</h1>
          <!-- Description -->
          <p class="reset-password-description">Entrez votre adresse email et nous vous enverrons un lien de réinitialisation.</p>

          <!-- Formulaire -->
          <form class="reset-password-form">

            <!-- Email -->
            <div class="mb-4">
              <label for="EmailInput" class="form-label">Email <span class="required">*</span></label>
              <input 
                type="email" 
                class="form-control reset-password-input" 
                id="EmailInput" 
                placeholder="votre@email.com" 
                name="Email"
                aria-describedby="emailHelp"
                required
              > 
            </div>

            <!-- Bouton d'envoi de lien -->
            <div class="d-grid">
              <button type="submit" class="btn btn-reset-password">
                Envoyer le lien
                <i class="bi bi-arrow-right"></i>
              </button>
            </div>

          </form>

          <!-- Lien de retour à la connexion -->
          <div class="reset-password-signup">
            <a href="/login">Retourner à la connexion</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

<!-- ================= Section Hero connexion ================= -->
<section class="login-hero py-5">
  <div class="container">
    <!-- Titre -->
    <h1 class="login-hero-title">Connexion</h1>
    <!-- Description -->
    <p class="login-hero-description">Accédez à votre espace personnel.</p>
  </div>
</section>
<section class="login-section">
  <div class="container">
    <div class="login-card">
      
      <!-- Titre -->
      <h1 class="login-title">Connexion</h1>
      
      <!-- Formulaire -->
      <form class="login-form">
        
        <!-- Email -->
        <div class="mb-4">
          <label for="EmailInput" class="form-label">Email <span class="required">*</span></label>
          <input 
            type="email" 
            class="form-control login-input" 
            id="EmailInput" 
            placeholder="votre@email.com" 
            name="Email"
            aria-describedby="emailHelp"
            required
          >
          <div class="invalid-feedback">
            Le mail ou le mot de passe ne correspondent pas.
          </div>
          <div class="valid-feedback">
            Le mail est correct.
          </div>
        </div>
        <!-- Mot de passe -->
        <div class="mb-4 password-field">
          <label for="PasswordInput" class="form-label">Mot de passe <span class="required">*</span></label>
          <input 
            type="password" 
            class="form-control login-input" 
            id="PasswordInput" 
            placeholder="Votre mot de passe"
            name="Password"
            required
          >
          <button type="button" class="btn-show-password" id="togglePassword" aria-label="Afficher/masquer le mot de passe">
            <i class="bi bi-eye"></i>
          </button>
          <div class="invalid-feedback">
            Le mot de passe ne correspond pas.
          </div>
          <div class="valid-feedback">
            Le mot de passe est correct.
          </div>
        </div>
      
        <!-- Mot de passe oublié -->
        <div class="mb-4">
          <a href="/reset_login" class="login-forgot">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton de connexion -->
        <button type="submit" class="btn-login" id="btnLogin">
          <i class="bi bi-person-fill-check"></i>
          Se connecter
        </button>

      </form>

      <!-- Lien inscription -->
      <div class="login-signup">
        <span>Pas encore de compte ?</span>
        <a href="/inscription">S'inscrire</a>
      </div>

    </div>
  </div>
</section>

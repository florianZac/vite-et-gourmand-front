<!------ Section Hero compte Admin -------->
<section class="compte_admin-hero py-5">
  <div class="container">
    <h1 class="compte_admin-hero-title text-center">Espace Administrateur</h1>
    <p class="compte_admin-hero-welcome text-center">Bienvenue, <span id="hero-user-name"></span></p>
  </div>
</section>

<!------ Section compte Admin -------->
<section class="compte_admin-section">
  <div class="container">

    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="row justify-content-center compte_admin">

        <!------ Onglets Navigation -------->
        <div class="row justify-content-center compte_admin">
          <!------ Onglets Statistiques -------->
          <div class="col-12 col-md-4">
            <a href="/statistiques" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-graph-up fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Statistiques</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Profil -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_profil" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-person-gear fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Profil</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Utilisateurs -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_utilisateurs" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-people-fill fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Employés & Utilisateurs</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Menus (ACTIVE) -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_menus" class="card text-center text-decoration-none h-100 active">
              <div class="card-body py-3">
                <i class="bi bi-fork-knife fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Menus</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Plat -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_plat" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-egg-fried fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Plat</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Allergènes -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_allergene" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-virus fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Allergènes</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Thèmes & Règimes -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_theme_regimes" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-receipt fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Thèmes & Règimes</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Commandes & Avis -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_commandes_avis" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-calculator-fill fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Commandes & Avis</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Horraire -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_horraire" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-clock-fill fs-4 mb-1 "></i>
                <h6 class="card-title mb-0">Gestion Horraire</h6>
              </div>
            </a>
          </div>
        </div>

        <!------ Titre de la Navigation  -------->
        <h2 class="compte_admin-title text-center pb-4 pt-2">Gestion des Menus</h2>

        <!------ Barre recherche + bouton nouveau -------->
        <div class="card mb-4 shadow-sm">
          <div class="card-body">
            <div class="row g-2 align-items-center">
              <div class="col-md-8">
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-search"></i></span>
                  <input type="text" id="search-menu" class="form-control" placeholder="Rechercher un menu...">
                </div>
              </div>
               <!-- Filtre Stock -->
              <div class="col-md-2">
                <select id="filter-status" class="form-select" title="filtre stock disponible">
                  <option value="">Tous</option>
                  <option value="En stock">En stock</option>
                  <option value="Rupture">Rupture</option>
                </select>
              </div>
               <!-- Bouton nouveau menus -->
              <div class="col-md-2 text-end">
                <button type="submit"  class="btn btn-primary" id="btn-new-menu" title="Nouveau menu">
                  <i class="bi bi-plus me-1"></i> Nouveau menu
                </button>
              </div>
            </div>
          </div>
        </div>

        <!------ Formulaire création/modification -------->
        <div class="card mb-4 shadow-sm d-none" id="menu-form-card">
          <div class="card-body">
            <h3 class="fw-bold mb-3" id="menu-form-title">Créer un menu</h3>

            <!-- Titre + Thème + Régime -->
            <div class="row mb-3">
              <div class="col-md-5">
                <label class="form-label">Titre <span class="text-danger">*</span></label>
                <input type="text" id="menu-titre" class="form-control" placeholder="Nom du menu...">
              </div>
              <div class="col-md-3">
                <label class="form-label">Thème <span class="text-danger">*</span></label>
                <select id="menu-theme" class="form-select" title="Sélection menus"></select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Régime <span class="text-danger">*</span></label>
                <select id="menu-regime" class="form-select" title="Sélection régime"></select>
              </div>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label">Description <span class="text-danger">*</span></label>
              <textarea id="menu-description" class="form-control" rows="3" placeholder="Description du menu..."></textarea>
            </div>

            <!-- Min personnes + Prix + Quantité -->
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label">Min. personnes <span class="text-danger">*</span></label>
                <input type="number" id="menu-min-personnes" class="form-control " title="Nombre min de personne" min="1" value="1">
              </div>
              <div class="col-md-4">
                <label class="form-label">Prix / personne (€) <span class="text-danger">*</span></label>
                <input type="number" id="menu-prix" class="form-control" title="Prix / personne du menu" min="0" step="0.01" value="0">
              </div>
              <div class="col-md-4">
                <label class="form-label">Quantité restante <span class="text-danger">*</span></label>
                <input type="number" id="menu-quantite" class="form-control" title="Quantitée restante du menu" min="1" value="50">
              </div>
            </div>

            <!-- Conditions -->
            <div class="mb-3">
              <label class="form-label">Conditions</label>
              <input type="text" id="menu-conditions" class="form-control" placeholder="Conditions (optionnel)...">
            </div>

            <!-- Plats (max 3) -->
            <h4 class="fw-bold mt-4 mb-3">Plats</h4>
            <div id="plats-select-container"></div>
            <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="btn-add-plat-select">
              <i class="bi bi-plus"></i> Ajouter un plat
            </button>

            <!-- Boutons -->
            <div class="d-flex gap-3 mt-4">
              <button class="btn btn-primary" id="btn-save-menu">
                <i class="bi bi-save me-1"></i> Créer le menu
              </button>
              <button class="btn btn-outline-secondary" id="btn-cancel-menu">Annuler</button>
            </div>
          </div>
        </div>

        <!------ Liste des menus -------->
        <div id="menus-list"></div>

        <!------ Toast -------->
        <div class="d-flex justify-content-center mt-3">
          <div id="toast-message" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal Suppression Menu -->
<div class="modal fade" id="deleteMenuModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-trash text-danger me-2"></i>Supprimer le menu</h5>
        <button class="btn-close" data-bs-dismiss="modal" title="Fermer"></button>
      </div>
      <div class="modal-body">
        <p>Voulez-vous vraiment supprimer <strong id="delete-menu-name"></strong> ?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-danger" id="confirm-delete-menu">Confirmer</button>
      </div>
    </div>
  </div>
</div>

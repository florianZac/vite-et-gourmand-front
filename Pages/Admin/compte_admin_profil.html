<!------ Section Hero compte Admin -------->
<section class="compte_admin-hero py-5">
  <div class="container">
    <h1 class="compte_admin-hero-title text-center">Espace Administrateur</h1>
    <p class="compte_admin-hero-welcome text-center">Bienvenue, <span id="hero-user-name"></span></p>
  </div>
</section>

<!------ Section compte Admin -------->
<section class="compte_admin-section">
  <div class="container">

    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="row justify-content-center compte_admin">

        <!------ Onglets Navigation -------->
        <div class="row justify-content-center compte_admin">
          
          <!------ Onglets Statistiques -------->
          <div class="col-12 col-md-4">
            <a href="/statistiques" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-graph-up fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Statistiques</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Profil (ACTIVE) -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_profil" class="card text-center text-decoration-none h-100 active">
              <div class="card-body py-3">
                <i class="bi bi-person-gear fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Profil</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Utilisateurs -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_utilisateurs" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-people-fill fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Employés & Utilisateurs</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Menus -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_menus" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-fork-knife fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Menus</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Plat -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_plat" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-egg-fried fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Plat</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Allergènes -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_allergene" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-virus fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Gestion Allergènes</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Thèmes & Règimes -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_theme_regimes" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-receipt fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Thèmes & Règimes</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Commandes & Avis -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_commandes_avis" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-calculator-fill fs-4 mb-1"></i>
                <h6 class="card-title mb-0">Commandes & Avis</h6>
              </div>
            </a>
          </div>
          <!------ Onglets Gestion Horraire -------->
          <div class="col-12 col-md-4">
            <a href="/gestion_horraire" class="card text-center text-decoration-none h-100">
              <div class="card-body py-3">
                <i class="bi bi-clock-fill fs-4 mb-1 "></i>
                <h6 class="card-title mb-0">Gestion Horraire</h6>
              </div>
            </a>
          </div>
        </div>

        <!------ Titre de la Navigation  -------->
        <h2 class="compte_admin-title text-center pb-4 pt-2">Gestion Profil Administrateur</h2>

        <!------ Barre recherche + filtres -------->
        <div class="card mb-4 shadow-sm">
          <div class="card-body">

            <div class="row g-2 align-items-center">
              <!------ Carte compte client_profil (avatar + nom + email) -------->
              <div class="compte_admin_profil-identity">
                <!-- Avatar utilisateur -->
                <div class="compte_admin_profil-avatar">
                  <i class="bi bi-person-fill"></i>
                </div>
                <!-- Nom et email affichés sous l'avatar -->
                <h2 class="compte_admin_profil-name" id="compte_admin_profil-display-name">Marie Dupont</h2>
                <p class="compte_admin_profil-email" id="compte_admin_profil-display-email">marie.dupont@email.com</p>
              </div>

              <!------ Formulaire Informations Personnelles -------->
              <div class="compte_admin_profil-card">
                <form class="compte_admin_profil-form" id="form-compte_admin_profil">
                  <!-- Prénom et Nom -->
                  <div class="row mb-4">
                    <div class="col-6">
                      <label for="compte_admin_profilFirstName" class="form-label">Prénom</label>
                      <input type="text" class="form-control compte_admin_profil-input" id="compte_admin_profilFirstName" placeholder="Marie">
                    </div>
                    <div class="col-6">
                      <label for="compte_admin_profilLastName" class="form-label">Nom</label>
                      <input type="text" class="form-control compte_admin_profil-input" id="compte_admin_profilLastName" placeholder="Dupont">
                    </div>
                  </div>

                  <!-- Téléphone -->
                  <div class="mb-4">
                    <label for="compte_admin_profilPhone" class="form-label">Téléphone</label>
                    <input type="tel" class="form-control compte_admin_profil-input" id="compte_admin_profilPhone" placeholder="06 12 34 56 78">
                  </div>

                  <!-- Email -->
                  <div class="mb-4">
                    <label for="compte_admin_profilEmail" class="form-label">Email</label>
                    <input type="email" class="form-control compte_admin_profil-input" id="compte_admin_profilEmail" placeholder="marie.dupont@email.com">
                  </div>

                  <!-- Adresse -->
                  <div class="mb-4">
                    <label for="compte_admin_profilAddress" class="form-label">Adresse</label>
                    <input type="text" class="form-control compte_admin_profil-input" id="compte_admin_profilAddress" placeholder="12 rue des Roses">
                  </div>

                  <!-- Ville et Code Postal -->
                  <div class="row mb-4">
                    <div class="col-6">
                      <label for="compte_admin_profilCity" class="form-label">Ville</label>
                      <input type="text" class="form-control compte_admin_profil-input" id="compte_admin_profilCity" placeholder="Bordeaux">
                    </div>
                    <div class="col-6">
                      <label for="compte_admin_profilPostal" class="form-label">Code Postal</label>
                      <input type="text" class="form-control compte_admin_profil-input" id="compte_admin_profilPostal" placeholder="33000">
                    </div>
                  </div>

                  <!-- Bouton sauvegarder -->
                  <div class="d-grid mb-3">
                    <button type="button" class="btn btn-compte_admin_profil-save" id="btn-save-compte_admin_profil">
                      Sauvegarder les modifications
                    </button>
                  </div>
                </form>  
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

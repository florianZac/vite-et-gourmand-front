<!------ Section Hero compte Employé -------->
<section class="compte_employer-hero py-5">
  <div class="container">
    <h1 class="compte_employer-hero-title">Mon Espace Employé</h1>
    <p class="compte_employer-hero-welcome">Bienvenue, <span id="hero-user-name"></span></p>
  </div>
</section>

<!------ Section compte Employé -------->
<section class="compte_employer-section">
  <div class="container">

    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="col-12 col-sm-11 col-md-10 col-lg-10 col-xl-12">

        <!------ Onglets Navigation -------->
        <div class="compte_employer">
          <a href="/compte_employer" class="compte_employer_commande active">
            Mes commandes
          </a>
          <a href="/avis_en_attente" class="compte_employer_avis">
            Avis En attente
          </a>
          <a href="/gestion_menus" class="compte_employer_gestion_menu">
            Menus
          </a>
        </div>
        <!------ Barre recherche + filtres -------->
        <div class="card mb-4 shadow-sm">
          <div class="card-body">

            <div class="row g-2 align-items-center">

              <!-- Recherche numéro commande -->
              <div class="col-md-6">
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-search"></i>
                  </span>
                  <input 
                    type="text"
                    id="search-order"
                    class="form-control"
                    placeholder="Rechercher par menu..."
                  >
                </div>
              </div>

              <!-- Filtre statut -->
              <div class="col-md-4">
                <select id="filter-status" class="form-select" title="filtre de statut">
                  <option value="">Tous les statuts</option>
                  <option value="En attente">En attente</option>
                  <option value="Acceptée">Acceptée</option>
                  <option value="En préparation">En préparation</option>
                  <option value="En livraison">En livraison</option>
                  <option value="Livré">Livré</option>
                  <option value="En attente de retour matériel">En attente retour matériel</option>
                  <option value="Terminée">Terminée</option>
                  <option value="Annulée">Annulée</option>
                </select>
              </div>

              <!-- Reset -->
              <div class="col-md-2 d-grid">
                <button id="reset-filters" class="btn btn-outline-secondary">
                  Reset
                </button>
              </div>

            </div>

          </div>
        </div>

        <!------ Liste des commandes injectée dynamiquement par le JS -------->
        <div id="commandes-list">
          <!-- Les cards de commandes seront injectées ici par le JS -->
        </div>
      </div>
    </div>
  </div>
</section>

<div class="modal fade" id="cancelModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-x-circle text-danger"></i>
          Annuler la commande
        </h5>
        <button class="btn-close" data-bs-dismiss="modal" title="modal de dialogue"></button>
      </div>

      <div class="modal-body">

        <textarea
          id="cancel-reason"
          class="form-control"
          maxlength="500"
          rows="4"
          placeholder="Expliquez la raison de l'annulation..."
        ></textarea>

        <div class="text-end mt-2">
          <small id="cancel-count">0 / 250</small>
        </div>

        <div class="text-danger small mt-2 d-none" id="cancel-error">
          Veuillez entrer un motif.
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Fermer
        </button>

        <button class="btn btn-danger" id="confirm-cancel">
          Confirmer l'annulation
        </button>
      </div>

    </div>
  </div>
</div>

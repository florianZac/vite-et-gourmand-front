<!------ Section Hero compte Employé -------->
<section class="compte_employer-hero py-5">
  <div class="container">
    <h1 class="compte_employer-hero-title">Mon Espace Employé</h1>
    <p class="compte_employer-hero-welcome">Bienvenue, <span id="hero-user-name"></span></p>
  </div>
</section>

<!------ Section compte Employé -------->
<section class="compte_employer-section">
  <div class="container">

    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="col-6 compte_employer">

        <!------ Onglets Commande -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_commande_employer" class="card text-center text-decoration-none h-100">
            <div class="card-body py-3">
              <i class="bi bi-basket-fill fs-4 mb-1"></i>
              <h6 class="card-title mb-0 ">Gestion Commande</h6>
            </div>
          </a>
        </div>
        <!------ Onglets Gestion Avis Client -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_avis_employer" class="card text-center text-decoration-none h-100">
            <div class="card-body py-3">
              <i class="bi bi-star-half fs-4 mb-1"></i>
              <h6 class="card-title mb-0">Gestion Avis Client</h6>
            </div>
          </a>
        </div>
        <!------ Onglets Gestion Menu -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_menus_employer" class="card text-center text-decoration-none h-100">
            <div class="card-body py-3">
              <i class="bi bi-wallet-fill mb-1"></i>
              <h6 class="card-title mb-0">Gestion Menu</h6>
            </div>
          </a>
        </div>
        <!------ Onglets Gestion Allergènes -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_allergene_employer" class="card text-center text-decoration-none h-100">
            <div class="card-body py-3">
              <i class="bi bi-virus fs-4 mb-1"></i>
              <h6 class="card-title mb-0">Gestion Allergènes</h6>
            </div>
          </a>
        </div>
        <!------ Onglets Gestion Plat (ACTIVE) -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_plat_employer" class="card text-center text-decoration-none h-100 active">
            <div class="card-body py-3">
              <i class="bi bi-egg-fried fs-4 mb-1"></i>
              <h6 class="card-title mb-0">Gestion Plat</h6>
            </div>
          </a>
        </div>
        <!------ Onglets Thèmes & Règimes -------->
        <div class="col-12 col-md-4">
          <a href="/gestion_theme_regime_employer" class="card text-center text-decoration-none h-100">
            <div class="card-body py-3">
              <i class="bi bi-receipt fs-4 mb-1"></i>
              <h6 class="card-title mb-0">Thèmes & Règimes</h6>
            </div>
          </a>
        </div>
      </div>
      <!------ Titre -------->
      <h2 class="compte_admin-title text-center pb-4 pt-2">Gestion des Plats</h2>

      <!------ Recherche + bouton nouveau -------->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <div class="row g-2 align-items-center">
            <!-- Recherche -->
            <div class="col-12 col-md-5">
              <div class="input-group">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-search"></i></span>
                <input type="text" id="search-plat" class="form-control rounded-end-pill" placeholder="Rechercher un plat...">
              </div>
            </div>
            <!-- Filtre catégorie -->
            <div class="col-6 col-md-3">
              <select id="filter-categorie" class="form-select rounded-pill" title="Filtrer par catégorie">
                <option value="">Toutes catégories</option>
                <option value="Entrée">Entrée</option>
                <option value="Plat">Plat</option>
                <option value="Dessert">Dessert</option>
              </select>
            </div>
            <!-- Bouton nouveau -->
            <div class="col-6 col-md-4 text-end">
              <button type="button" title="Nouveau plat" class="btn btn-primary rounded-pill px-4" id="btn-new-plat">
                <i class="bi bi-plus me-1"></i> Nouveau plat
              </button>
            </div>
          </div>
        </div>
      </div>
      <!------ Formulaire création/modification (caché) -------->
      <div class="card mb-4 shadow-sm d-none" id="plat-form-card">
        <div class="card-body">
          <h3 class="fw-bold mb-3" id="plat-form-title">Créer un plat</h3>

          <!-- Titre + Catégorie -->
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Titre du plat <span class="text-danger">*</span></label>
              <input type="text" id="plat-titre" class="form-control" placeholder="Bœuf bourguignon...">
            </div>
            <div class="col-md-6">
              <label class="form-label">Catégorie <span class="text-danger">*</span></label>
              <select id="plat-categorie" class="form-select" title="Type de plat">
                <option value="Entrée">Entrée</option>
                <option value="Plat">Plat</option>
                <option value="Dessert">Dessert</option>
              </select>
            </div>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="plat-description" class="form-control" rows="2" placeholder="Description du plat..."></textarea>
          </div>

          <!-- Photo upload -->
          <div class="mb-3">
            <label class="form-label">Photo du plat <span class="text-danger">*</span></label>
            <div class="d-flex gap-3 align-items-start">
              <div class="flex-grow-1">
                <input type="file" id="plat-photo-file" class="form-control" title="Input photo" accept="image/jpeg,image/png,image/webp">
                <input type="hidden" id="plat-photo-url">
                <small class="text-muted">Formats : JPG, PNG, WebP — Max 5 Mo</small>
              </div>
              <div id="plat-photo-preview-container">
                <img id="plat-photo-preview" src="" alt="Aperçu" >
              </div>
            </div>
            <div id="upload-progress" class="mt-2 d-none">
              <div class="progress">
                <div class="progress-bar" id="upload-bar"></div>
              </div>
              <small class="text-muted" id="upload-status">Upload en cours...</small>
            </div>
          </div>

          <!-- Allergènes (checkboxes) -->
          <div class="mb-3">
            <label class="form-label">Allergènes</label>
            <div id="plat-allergenes-checkboxes" class="d-flex flex-wrap gap-2">
              <!-- Rempli dynamiquement -->
            </div>
          </div>

          <!-- Boutons -->
          <div class="d-flex gap-3 mt-4 justify-content-center">
            <button type="button" title="Créer un plat" class="btn btn-primary" id="btn-save-plat">
              <i class="bi bi-save me-1"></i> Créer le plat
            </button>
            <button type="button" title="Annuler" class="btn btn-outline-secondary" id="btn-cancel-plat">Annuler</button>
          </div>
        </div>
      </div>

      <!------ Liste des plats -------->
      <div id="plats-list"></div>

      <!------ Toast -------->
      <div class="d-flex justify-content-center mt-3">
        <div id="toast-message" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="toast-body"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal Suppression Plat -->
<div class="modal fade" id="deletePlatModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-trash text-danger me-2"></i>Supprimer le plat</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" title="Fermer"></button>
      </div>
      <div class="modal-body">
        <p>Voulez-vous vraiment supprimer <strong id="delete-plat-name"></strong> ?</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-danger" id="confirm-delete-plat">Confirmer</button>
      </div>
    </div>
  </div>
</div>

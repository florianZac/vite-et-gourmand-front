<!-- ================= Section Hero Contact ================= -->
<section class="contact-hero py-5">
  <div class="container">
    <!-- Titre -->
    <h1 class="contact-hero-title">Nous contacter</h1>
    <!-- Description -->
    <p class="contact-hero-description">Une question, une demande de devis, ou simplement envie d'en savoir plus ?<br> Écrivez-nous, nous vous répondons sous 24h.</p>
  </div>
</section>

<!-- ================= Section Formulaire Contact ================= -->
<section class="contact-section">
  <div class="container">
    <!-- Grille Bootstrap centrée -->
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

        <!-- Carte contact -->
        <div class="contact-card">

          <!-- Formulaire -->
          <form class="contact-form">

            <!-- Sujet -->
            <div class="mb-4">
              <label for="SujetInput" class="form-label">
                Sujet <span class="required">*</span>
                <span class="contact-hint">(3 à 100 caractères)</span>
              </label>
              <input 
                type="text" 
                class="form-control contact-input" 
                id="SujetInput" 
                placeholder="Objet de votre message"
                name="Sujet"
                minlength="3"
                maxlength="100"
                required
              >
            </div>

            <!-- Email -->
            <div class="mb-4">
              <label for="EmailInput" class="form-label">
                Votre email <span class="required">*</span>
              </label>
              <input 
                type="email" 
                class="form-control contact-input" 
                id="EmailInput" 
                placeholder="votre@email.com"
                name="Email"
                required
              >
            </div>

            <!-- Message -->
            <div class="mb-4">
              <label for="MessageInput" class="form-label">
                Message <span class="required">*</span>
                <span class="contact-hint">(500 caractères max.)</span>
              </label>
              <textarea 
                class="form-control contact-input contact-textarea" 
                id="MessageInput" 
                rows="5" 
                placeholder="Décrivez votre demande, votre événement, vos questions..."
                name="Message"
								minlength="10"
                maxlength="500"
                required
              ></textarea>
              <div class="d-flex justify-content-end mt-1">
                <small class="contact-char-count">0/500</small>
              </div>
            </div>

            <!-- Honeypot anti-spam -->
            <div style="display:none;">
              <label for="site_web">Site web</label>
              <input type="text" id="site_web" name="site_web" autocomplete="off">
            </div>

            <!-- Bouton d'envoi -->
            <div class="d-grid">
              <button type="submit" class="btn btn-contact">
                <i class="bi bi-send-fill"></i> Envoyer le message
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</section>
